AirFilter3DPrinter:
  module: airfilter3dprinter
  class: AirFilter3DPrinter
  entity_fan: "fan.storeroom_air_purifier"
  entity_enclosure_door: "binary_sensor.3d_printer_enclosure_door_contact"
  entity_enclosure_air_pm25: "sensor.3d_printer_air_monitor_pm25"
  entity_enclosure_air_dirty: "input_boolean.appdaemon_airfilter3dprinter_air_dirty"
  entity_storeroom_air_pm25: "sensor.storeroom_airmonitor_pm2_5"
  entity_printer: "sensor.3d_printer_current_print_state"
  entity_timer_enclosure_door_opened: "timer.appdaemon_airfilter3dprinter_door_opened"
  entity_timer_print_ended: "timer.appdaemon_airfilter3dprinter_print_ended"
  entity_timestamp_print_started: "input_datetime.appdaemon_airfilter3dprinter_print_started"
  entity_timestamp_print_ended: "input_datetime.appdaemon_airfilter3dprinter_print_ended"
MQTTStateRetainer:
  module: mqttstateretainer
  class: MQTTStateRetainer
  entities:
    - source: "zigbee2mqtt/3D Printer Enclosure Temperature"
      target: "3dprinter/external_sensors/chamber"
      values:
        - "temperature"
        - "humidity"
    - source: "zigbee2mqtt/3D Printer Air Monitor"
      target: "3dprinter/external_sensors/chamber2"
      values:
        - "temperature"
        - "humidity"
        - "pm25"
        - "voc_index"
    - source: "zigbee2mqtt/3D Printer Power"
      target: "3dprinter/external_sensors/power"
      values:
        - "power"
        - "voltage"
        - "current"
        - "energy"
    - source: "zigbee2mqtt/3D Printer Enclosure Light"
      target: "3dprinter/external_sensors/light"
      values:
        - "state"
    - source: "zigbee2mqtt/3D Printer Filament Box 1"
      target: "3dprinter/external_sensors/box1"
      values:
        - "temperature"
        - "humidity"
    - source: "zigbee2mqtt/3D Printer Filament Box 2"
      target: "3dprinter/external_sensors/box2"
      values:
        - "temperature"
        - "humidity"
    - source: "zigbee2mqtt/3D Printer Enclosure Door"
      target: "3dprinter/external_sensors/enclosure_door"
      values:
        - "contact"
    - source: "zigbee2mqtt/Storeroom Door"
      target: "3dprinter/external_sensors/storeroom_door"
      values:
        - "contact"
    - source: "zigbee2mqtt/Storeroom Temperature"
      target: "3dprinter/external_sensors/storeroom_air"
      values:
        - "temperature"
        - "humidity"
Firealarm3DPrinter:
  module: firealarm3dprinter
  class: Firealarm3DPrinter
  entity_alarm_source: "zigbee2mqtt/3D Printer Smoke Detector"
  entity_alarm_target: "zigbee2mqtt/3D Printer Power"
  notify_targets:
    - "pushover"
    - "persistent_notification"
    - "notify"
StoreroomMotion:
  module: storeroommotion
  class: StoreroomMotion
  entity_sensor: "binary_sensor.storeroom_presence_occupancy"
  entity_switch: "switch.storeroom_light_switch"
  entity_timer: "timer.appdaemon_storeroommotion_light_timeout"
  motion_timeout: 5
  manual_timeout: 15
AirGradientLedsAdjust:
  module: airgradientledsadjust
  class: AirGradientLedsAdjust
  entities_ledbar:
    - "number.i_9psl_led_bar_brightness"
  entities_display:
    - "number.i_9psl_display_brightness"
  entity_timer: "binary_sensor.appdaemon_airgradientledsadjust_timer"
WashingMachineTimer:
  module: washingmachinetimer
  class: WashingMachineTimer
  entity_time: "input_datetime.appdaemon_washingmachinetimer_time"
  entity_switch: "switch.washing_machine_switch"
StateOffNotifier:
  module: stateoffnotifier
  class: StateOffNotifier
  states:
    - name: "Smarthome Power"
      msg_on: "RECOVERY: Smarthome power is now back ONLINE ({new})"
      msg_off: "WARNING: Smarthome power went OFFLINE ({new}), running now on UPS"
      listen_entity: "switch.bedroom_desk_power"
      notify_targets:
        - "pushover"
        - "persistent_notification"
    - name: "Fridge Power"
      msg_on: "RECOVERY: Fridge power is now back ONLINE ({new})"
      msg_off: "WARNING: Fridge power went OFFLINE ({new}), products may start to go bad"
      listen_entity: "switch.fridge_power"
      notify_targets:
        - "pushover"
        - "persistent_notification"
        - "notify"
    - name: "3D Printer Power"
      msg_on: "RECOVERY: 3D Printer power is now back ONLINE ({new})"
      msg_off: "WARNING: 3D Printer power went OFFLINE ({new}), print might have failed"
      listen_entity: "switch.3d_printer_power"
      notify_targets:
        - "pushover"
    - name: "Internet Power"
      msg_on: "RECOVERY: Internet power is now back ONLINE ({new})"
      msg_off: "WARNING: Internet power went OFFLINE ({new}), running now on UPS"
      listen_entity: "switch.infrastructure_power"
      notify_targets:
        - "pushover"
        - "persistent_notification"
    - name: "Computer Power"
      msg_on: "RECOVERY: Computer power is now back ONLINE ({new})"
      msg_off: "WARNING: Computer power went OFFLINE ({new}), might have lossed some unsaved data"
      listen_entity: "switch.computer_power"
      notify_targets:
        - "pushover"
    - name: "Dishwasher Power"
      msg_on: "RECOVERY: Dishwasher power is now back ONLINE ({new})"
      msg_off: "WARNING: Dishwasher power went OFFLINE ({new}), might have interrupted mid washing"
      listen_entity: "switch.dishwasher_power"
      notify_targets:
        - "pushover"
    - name: "Washmachine Leakage"
      msg_on: "WARNING: Washing machine is leaking water"
      msg_off: "RECOVERY: Washing machine leakage has been cleared"
      listen_entity: "binary_sensor.washing_machine_leak_water_leak"
      notify_targets:
        - "pushover"
StateIntervalChanger:
  module: stateintervalchanger
  class: StateIntervalChanger
  jobs:
    - name: "Cat Fountain"
      entity: "switch.cat_fountain"
      states:
        - state: "on"
          service: "switch/turn_on"
          duration: 60
        - state: "off"
          duration: 900
          service: "switch/turn_off"
StateTriggerAction:
  module: statetriggeraction
  class: StateTriggerAction
  workflows:
    - name: "computer_on"
      trigger:
        type: "mqtt"
        topic: "zigbee2mqtt/Bedroom Desk Button/action"
        states:
          - "on"
          - "single"
      action:
        func: "wake_computer"
        action_args:
          power_switch: "switch.computer_power"
          wol_device: "switch.gentude_power"
    - name: "computer_off"
      trigger:
        type: "mqtt"
        topic: "zigbee2mqtt/Bedroom Desk Button/action"
        states:
          - "off"
          - "double"
      action:
        func: "shutdown_computer"
        action_args:
          device: "switch.gentude_power"
    - name: "tv_on"
      trigger:
        type: "mqtt"
        topic: "zigbee2mqtt/TV Button/action"
        states:
          - "on"
          - "single"
      action:
        func: "wake_computer"
        action_args:
          power_switch: "switch.tv_power"
          wol_device: "switch.livingroom_tv_power"
    - name: "tv_off"
      trigger:
        type: "mqtt"
        topic: "zigbee2mqtt/TV Button/action"
        states:
          - "off"
          - "double"
      action:
        func: "shutdown_tv"
        action_args:
          power_switch: "switch.tv_power"
          device: "switch.livingroom_tv_power"
          device_status: "binary_sensor.livingroom_tv_ssh_status"
    - name: "restart_gdm"
      trigger:
        type: "ha"
        entity_id: "select.bedroom_desk_button_operation_mode"
        new_states:
          - "command"
          - "event"
      action:
        func: "execute_service"
        action_args:
          service: "ssh.execute_command"
          target:
            entity_id: "switch.gentude_power"
          command: "/usr/bin/sudo systemctl restart gdm.service"
          timeout: 10
TagReader:
  module: tagreader
  class: TagReader
  tags:
    - tag_id: "box1:slot1"
      action: "select_spool"
    - tag_id: "box1:slot2"
      action: "select_spool"
    - tag_id: "box1:slot3"
      action: "select_spool"
    - tag_id: "box1:slot4"
      action: "select_spool"
    - tag_id: "box2:slot1"
      action: "select_spool"
    - tag_id: "box2:slot2"
      action: "select_spool"
    - tag_id: "box2:slot3"
      action: "select_spool"
    - tag_id: "box2:slot4"
      action: "select_spool"
    - tag_id: "null_spool"
      action: "select_spool"
    - tag_id: "force_storeroom_light"
      action:
        name: "execute_service"
        action_args:
          namespace: "default"
          service: "storeroom.light"
          service_args:
            state: "on"
  actions:
    - name: "select_spool"
      action_args:
        spoolman_url: "http://3dprinter.internal:7912/api/v1/spool" # for getting all spools
        moonraker_url: "http://3dprinter.internal:7125/server/spoolman/spool_id"
Ha2MQTT:
  module: ha2mqtt
  class: Ha2MQTT
  entities:
    - id: "sensor.storeroom_airmonitor_pm2_5"
      topic: "3dprinter/external_sensors/storeroom_air_pm25"
      retain: True
